[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]

[phases.install]
cmds = ["cd server && npm install && cd ../client && npm install --include=optional"]

[phases.build]
cmds = ["cd server && npx prisma generate && cd ../client && npm run build"]

[start]
cmd = "cd server && npx prisma db push --accept-data-loss && node src/index.js"
